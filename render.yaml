services:
  - type: web
    name: pickleball-gpu-gateway
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./deploy/render/Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: PICKLEBALL_UPLOAD_ROOT
        value: /tmp/pickleball_uploads
      - key: PICKLEBALL_GPU_REPO
        value: /home/arnavchokshi/pickleball_git
      - key: PICKLEBALL_GPU_PYTHON
        value: /home/arnavchokshi/pickleball_git/.venv/bin/python
      - key: PICKLEBALL_GPU_SSH_KEY_PATH
        value: /etc/secrets/gcp_ssh_key
      - key: PICKLEBALL_GPU_KNOWN_HOSTS_PATH
        value: /etc/secrets/gcp_known_hosts
      - key: PICKLEBALL_GPU_COMMAND_TIMEOUT_S
        value: "7200"
      - key: PICKLEBALL_GPU_SSH_HOST
        sync: false
      # Product infra (INFRA-1): accounts land DARK — flip to "1" only after
      # Atlas/S3 provisioning + secrets are set in the Render dashboard.
      - key: PICKLEBALL_ACCOUNTS_ENABLED
        value: "0"
      # Product infra (INFRA-2): pull-worker queue lands DARK alongside
      # accounts — flip to "1" only after a worker VM is live and the
      # INFRA-2 gate (queued->claimed->running->succeeded, kill-mid-job
      # requeue) has passed against staging. HttpGpuRunner (the old
      # push-to-worker HTTP stub -- PICKLEBALL_GPU_WORKER_URL/_TOKEN) is
      # retired as of this lane; SshGpuRunner remains the flag-off fallback
      # for one wave.
      - key: PICKLEBALL_QUEUE_ENABLED
        value: "0"
      - key: PICKLEBALL_WORKER_BEARER_TOKEN
        sync: false
      - key: PICKLEBALL_MONGODB_DB_NAME
        value: pickleball
      - key: PICKLEBALL_S3_BUCKET
        value: pickleball-app-media
      - key: PICKLEBALL_S3_REGION
        value: us-east-1
      - key: PICKLEBALL_JWT_ACCESS_TTL_S
        value: "900"
      - key: PICKLEBALL_JWT_REFRESH_TTL_DAYS
        value: "30"
      - key: PICKLEBALL_STRIPE_ENABLED
        value: "0"
      - key: PICKLEBALL_MONGODB_URI
        sync: false
      - key: PICKLEBALL_AWS_ACCESS_KEY_ID
        sync: false
      - key: PICKLEBALL_AWS_SECRET_ACCESS_KEY
        sync: false
      - key: PICKLEBALL_JWT_SECRET
        sync: false
      - key: PICKLEBALL_INVITE_CODE
        sync: false

previews:
  generation: "off"
